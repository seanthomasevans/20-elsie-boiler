<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>20 Elsie #217 - Boiler Replacement</title>
  <style>
    :root {
      --bg-main: radial-gradient(circle at 18% 18%, #1c2530 0%, #0e1218 55%, #080b0f 100%);
      --panel-bg: rgba(14, 18, 24, 0.86);
      --panel-border: rgba(164, 180, 201, 0.22);
      --text-main: #f5f7fb;
      --text-muted: #aeb8c8;
      --accent: #7ec0ff;
      --accent-soft: rgba(126, 192, 255, 0.2);
      --chip-border: rgba(255, 255, 255, 0.12);
      --button-bg: #1f2a37;
      --button-bg-active: #2e4358;
      --button-border: rgba(156, 182, 207, 0.4);
    }
    * { box-sizing: border-box; margin: 0; }
    html, body {
      height: 100%;
      font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
      color: var(--text-main);
      background: #080b0f;
      background-image: var(--bg-main);
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      height: 100dvh;
      gap: 1rem;
      padding: 1rem;
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 1rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.35);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .title-block h1 { font-size: 1.05rem; line-height: 1.3; font-weight: 650; }
    .title-block p { margin-top: 0.3rem; color: var(--text-muted); font-size: 0.82rem; line-height: 1.5; }
    .section-label {
      margin: 0 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .version-toggle {
      display: flex;
      border: 1px solid var(--accent);
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .version-toggle button {
      flex: 1;
      padding: 0.55rem 0.5rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 200ms ease;
      line-height: 1.3;
    }
    .version-toggle button.active {
      background: var(--accent);
      color: #0a0f14;
    }
    .version-toggle button:not(.active):hover {
      background: rgba(126, 192, 255, 0.12);
      color: var(--text-main);
    }
    .version-badge {
      display: inline-block;
      font-size: 0.62rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
      vertical-align: middle;
      margin-left: 0.3rem;
    }
    .badge-tankless { background: #2a5a3a; color: #8fd4a8; }
    .badge-combi { background: #3a4a6a; color: #8fb8e8; }
    .info-panel {
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 0.65rem;
      background: rgba(126, 192, 255, 0.06);
      font-size: 0.82rem;
      line-height: 1.5;
      min-height: 52px;
      transition: border-color 300ms ease;
    }
    .info-panel.empty { border-color: var(--chip-border); background: rgba(255,255,255,0.02); }
    .info-name { color: var(--accent); font-weight: 600; margin-bottom: 0.2rem; }
    .info-group { color: var(--text-muted); font-size: 0.76rem; }
    .info-desc { color: var(--text-main); margin-top: 0.25rem; font-size: 0.78rem; }
    .info-hint { color: var(--text-muted); font-size: 0.76rem; font-style: italic; }
    .layers-panel {
      border: 1px solid var(--chip-border);
      border-radius: 12px;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.02);
      max-height: 240px;
      overflow-y: auto;
    }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.4rem;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 160ms ease;
      font-size: 0.8rem;
      color: #d7dfeb;
    }
    .layer-item:hover { background: rgba(255, 255, 255, 0.05); }
    .layer-item input {
      accent-color: #8dc9ff;
      width: 0.9rem; height: 0.9rem; margin: 0; cursor: pointer;
    }
    .layer-dot {
      width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0;
    }
    .spec-panel {
      border: 1px solid var(--chip-border);
      border-radius: 12px;
      padding: 0.6rem;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .spec-row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-value { color: var(--text-main); font-weight: 500; }
    .notes {
      border: 1px solid var(--chip-border);
      border-radius: 12px;
      padding: 0.6rem;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.74rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .notes ul { padding-left: 0.9rem; margin: 0.2rem 0; }
    .notes li { margin-bottom: 0.2rem; }
    .notes strong { color: var(--text-main); }
    .viewer-shell {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: rgba(8, 12, 17, 0.6);
    }
    #c {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #c:active { cursor: grabbing; }
    .hud {
      position: absolute;
      left: 1rem; bottom: 1rem;
      z-index: 5;
      background: rgba(8, 12, 17, 0.72);
      border: 1px solid rgba(157, 184, 215, 0.28);
      color: var(--text-muted);
      font-size: 0.72rem;
      border-radius: 10px;
      padding: 0.35rem 0.6rem;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .reset-btn {
      position: absolute;
      right: 1rem; bottom: 1rem;
      z-index: 5;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      color: var(--text-main);
      font-size: 0.72rem;
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .reset-btn:hover { background: var(--button-bg-active); }
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 12, 17, 0.85);
      z-index: 10;
      font-size: 0.88rem;
      color: var(--accent);
      transition: opacity 400ms ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(55vh, 1fr);
        height: auto; min-height: 100dvh; padding: 0.75rem;
      }
      .sidebar { border-radius: 14px; }
      .viewer-shell { border-radius: 14px; min-height: 62vh; }
      .layers-panel { max-height: 160px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="title-block">
        <h1>20 Elsie Lane #217</h1>
        <p id="subtitle"></p>
      </section>

      <section>
        <p class="section-label">Configuration</p>
        <div class="version-toggle">
          <button id="btnTankless" onclick="switchVersion('tankless')">
            RXP199iN<span class="version-badge badge-tankless">v13</span><br>
            <span style="font-weight:400;font-size:0.7rem;color:var(--text-muted)">Tankless + External</span>
          </button>
          <button id="btnCombi" onclick="switchVersion('combi')">
            i120CN<span class="version-badge badge-combi">v14</span><br>
            <span style="font-weight:400;font-size:0.7rem;color:var(--text-muted)">Combi Boiler</span>
          </button>
        </div>
      </section>

      <section>
        <p class="section-label">Selected Component</p>
        <div class="info-panel empty" id="infoPanel">
          <span class="info-hint">Click any component to inspect it.</span>
        </div>
      </section>

      <section>
        <p class="section-label">Layers</p>
        <div class="layers-panel" id="layersPanel"></div>
      </section>

      <section>
        <p class="section-label">Closet</p>
        <div class="spec-panel">
          <div class="spec-row"><span>Width</span><span class="spec-value">36&Prime;</span></div>
          <div class="spec-row"><span>Depth</span><span class="spec-value">32&Prime;</span></div>
          <div class="spec-row"><span>Height</span><span class="spec-value">80&Prime; (flat ceiling)</span></div>
          <div class="spec-row"><span>Left wall</span><span class="spec-value">Exterior</span></div>
          <div class="spec-row"><span>Air handler</span><span class="spec-value" id="ahSpec"></span></div>
        </div>
      </section>

      <section>
        <p class="section-label" id="unitLabel"></p>
        <div class="spec-panel" id="unitSpecs"></div>
      </section>

      <section id="archSection" style="display:none">
        <p class="section-label">Architecture</p>
        <div class="notes" id="archNotes"></div>
      </section>
    </aside>

    <section class="viewer-shell" aria-label="3D boiler closet model">
      <canvas id="c"></canvas>
      <div class="hud">Click to select. Drag to orbit. Scroll to zoom. Right-drag to pan.</div>
      <button class="reset-btn" id="resetBtn">Reset View</button>
      <div class="loading-overlay" id="loadingOverlay">Loading model...</div>
    </section>
  </main>

          'Port_Gas': 'Gas port (3/4\u2033 NPT). Right side of unit. [REUSE existing CSST]',

          'AirHandler': 'Temp-Mizer HV-52H air handler (64\u201380\u2033 AFF). 32,700 BTU @ 130\u00b0F EWT, 550 CFM. [REUSE EXISTING]',
          'SupplyDuct': 'Supply duct to HVAC distribution above ceiling. [REUSE EXISTING]',
          'VentExh_Run': '2\u2033 PVC exhaust at 62\u2033 AFF (under AH). Exits left (exterior) wall. Native 2\u2033 from unit. [NEW PVC]',

          'VentInt_Elb2': '2\u2033 PVC 90\u00b0 elbow. Intake turn through exterior wall. [NEW]',
          'VentInt_Cap': 'Intake termination cap on exterior wall. [NEW]',
          'Gas_Line': '3/4\u2033 CSST gas supply. Yellow corrugated SS. [REUSE EXISTING]',
          'GasShutoff': 'Gas shutoff valve. Brass ball valve on supply drop. [REUSE EXISTING]',

          'CH_Supply': '1\u2033 CPVC central heating supply. Rinnai to air handler. Closed loop, treated water. Routed with SharkBite 90\u00b0 elbows at each turn. [NEW CPVC + 5 elbows]',
          'CH_Return': '1\u2033 CPVC central heating return. Air handler to Rinnai. Closed loop. Routed with SharkBite 90\u00b0 elbows. [NEW CPVC + 5 elbows]',

          'ExpTank_CH_Cap': 'CH expansion tank Schrader cap. Check/adjust pre-charge here. [Included]',
          'FillValve': 'Fill valve on CH return at back wall (X=6\u2033). Opens to charge closed loop from potable supply. Close after filling. [NEW]',
          'Cond_Drop': 'PVC condensate drop from unit to neutralizer. Gravity drain. 90\u00b0 elbow at base. [NEW]',
          'Neutralizer': 'Condensate neutralizer. Rinnai 804000074. Calcium carbonate media. [NEW \u2014 ~$50]',
          'Cond_ToDrain': 'PVC condensate from neutralizer to floor drain. Routed with 90\u00b0 elbows. [NEW]',
          'DrainChannel': 'Floor drain channel for condensate. [NEW]',
          'ElecSwitch': 'Light switch on left (exterior) wall. [REUSE EXISTING]',
          'ElecXfmr': '24V transformer. Powers thermostat circuit. [REUSE EXISTING]',
          'ElecOutlet': '120V outlet. Rinnai power supply. [REUSE EXISTING]',
          'FloorDrain': 'Floor drain. Right side at X=28\u2033. [REUSE EXISTING]',
          'Drain_X': 'Floor drain cross channel (X-axis). [REUSE EXISTING]',
          'Drain_Y': 'Floor drain cross channel (Y-axis). [REUSE EXISTING]',
        }
      }
    };

    // ================================================================
    // THREE.JS SETUP
    // ================================================================

    const canvas = document.getElementById('c');
    const shell = canvas.parentElement;
    const infoPanel = document.getElementById('infoPanel');
    const layersPanel = document.getElementById('layersPanel');
    const resetBtn = document.getElementById('resetBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f141b);

    const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 50);
    camera.position.set(1.8, 1.5, 1.2);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 0.3;
    controls.maxDistance = 5;
    controls.maxPolarAngle = Math.PI * 0.92;
    controls.target.set(0.45, 0.8, -0.4);

    const defaultTarget = new THREE.Vector3(0.45, 0.8, -0.4);
    const defaultPosition = new THREE.Vector3(1.8, 1.5, 1.2);

    const hemi = new THREE.HemisphereLight(0xddeeff, 0x445566, 0.8);
    scene.add(hemi);
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(2, 3, 1);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899bb, 0.6);
    fill.position.set(-1.5, 2, -0.5);
    scene.add(fill);
    const interior = new THREE.PointLight(0xffeedd, 0.8, 4);
    interior.position.set(0.45, 0.5, -0.4);
    scene.add(interior);

    // ================================================================
    // STATE
    // ================================================================

    let allMeshes = [];
    let layerGroups = [];
    let selectedMesh = null;
    let savedMaterial = null;
    let targetPos = null;
    let currentVersion = null;
    let modelRoot = null;
    let currentDescriptions = {};

    const loader = new GLTFLoader();

    // ================================================================
    // VERSION SWITCHING
    // ================================================================

    function switchVersion(version) {
      if (version === currentVersion) return;
      currentVersion = version;
      const cfg = VERSIONS[version];

      document.getElementById('btnTankless').classList.toggle('active', version === 'tankless');
      document.getElementById('btnCombi').classList.toggle('active', version === 'combi');

      document.getElementById('subtitle').textContent = cfg.subtitle;
      document.getElementById('ahSpec').textContent = cfg.ahSpec;
      document.getElementById('unitLabel').textContent = cfg.unitLabel;
      document.getElementById('unitSpecs').innerHTML = cfg.unitSpecs;

      const archSection = document.getElementById('archSection');
      if (cfg.archNotes) {
        archSection.style.display = '';
        document.getElementById('archNotes').innerHTML = cfg.archNotes;
      } else {
        archSection.style.display = 'none';
      }

      currentDescriptions = cfg.descriptions;

      const url = new URL(window.location);
      url.searchParams.set('v', version);
      history.replaceState(null, '', url);

      loadModel(cfg);
    }

    function loadModel(cfg) {
      loadingOverlay.classList.remove('hidden');

      deselectMesh();
      if (modelRoot) {
        scene.remove(modelRoot);
        modelRoot = null;
      }
      allMeshes = [];

      layerGroups = cfg.layers.map(d => ({ ...d, meshes: [], visible: true }));

      loader.load(cfg.glb + '?v=' + Date.now(), (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);

        modelRoot.traverse((child) => {
          if (!child.isMesh) return;
          allMeshes.push(child);

          for (const group of layerGroups) {
            if (group.prefixes.some(p => child.name.startsWith(p))) {
              group.meshes.push(child);
              break;
            }
          }
        });

        buildLayerUI();
        loadingOverlay.classList.add('hidden');
        console.log(`Loaded ${currentVersion}: ${allMeshes.length} meshes`);
      });
    }

    // ================================================================
    // LAYER UI
    // ================================================================

    function buildLayerUI() {
      layersPanel.innerHTML = '';
      for (const group of layerGroups) {
        const label = document.createElement('label');
        label.className = 'layer-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.addEventListener('change', () => {
          group.visible = cb.checked;
          for (const m of group.meshes) m.visible = cb.checked;
        });

        const dot = document.createElement('span');
        dot.className = 'layer-dot';
        dot.style.background = group.color;

        const text = document.createElement('span');
        text.textContent = `${group.name} (${group.meshes.length})`;

        label.append(cb, dot, text);
        layersPanel.appendChild(label);
      }
    }

    // ================================================================
    // SELECTION
    // ================================================================

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let mouseDownPos = null;

    canvas.addEventListener('pointerdown', (e) => {
      mouseDownPos = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!mouseDownPos) return;
      const dx = e.clientX - mouseDownPos.x;
      const dy = e.clientY - mouseDownPos.y;
      if (Math.abs(dx) + Math.abs(dy) < 5) onSelect(e);
      mouseDownPos = null;
    });

    function onSelect(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(allMeshes, false);
      const hit = hits.find(h => h.object.visible);

      if (hit) selectMesh(hit.object);
      else deselectMesh();
    }

    function selectMesh(mesh) {
      deselectMesh();
      selectedMesh = mesh;
      savedMaterial = mesh.material;

      const hlMat = mesh.material.clone();
      hlMat.emissive = new THREE.Color(0x2266ff);
      hlMat.emissiveIntensity = 0.35;
      mesh.material = hlMat;

      const box = new THREE.Box3().setFromObject(mesh);
      targetPos = box.getCenter(new THREE.Vector3());

      const name = mesh.name;
      const group = layerGroups.find(g => g.meshes.includes(mesh));
      const desc = findDescription(name);

      infoPanel.classList.remove('empty');
      infoPanel.innerHTML = `
        <div class="info-name">${cleanName(name)}</div>
        <div class="info-group">${group ? group.name : 'Unknown'}</div>
        ${desc ? `<div class="info-desc">${desc}</div>` : ''}
      `;
    }

    function deselectMesh() {
      if (selectedMesh && savedMaterial) selectedMesh.material = savedMaterial;
      selectedMesh = null;
      savedMaterial = null;
      infoPanel.classList.add('empty');
      infoPanel.innerHTML = '<span class="info-hint">Click any component to inspect it.</span>';
    }

    function findDescription(name) {
      if (currentDescriptions[name]) return currentDescriptions[name];
      for (const [key, desc] of Object.entries(currentDescriptions)) {
        if (name.startsWith(key)) return desc;
      }
      return null;
    }

    function cleanName(name) {
      return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\./g, ' ');
    }

    // ================================================================
    // CONTROLS
    // ================================================================

    resetBtn.addEventListener('click', () => {
      deselectMesh();
      targetPos = defaultTarget.clone();
      camera.position.copy(defaultPosition);
    });

    function onResize() {
      const w = shell.clientWidth;
      const h = shell.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    function animate() {
      requestAnimationFrame(animate);
      if (targetPos) {
        controls.target.lerp(targetPos, 0.06);
        if (controls.target.distanceTo(targetPos) < 0.0005) {
          controls.target.copy(targetPos);
          targetPos = null;
        }
      }
      controls.update();
      renderer.render(scene, camera);
    }

    onResize();
    animate();

    // ================================================================
    // INIT
    // ================================================================

    const params = new URLSearchParams(window.location.search);
    const initVersion = params.get('v') === 'tankless' ? 'tankless' : 'combi';

    window.switchVersion = switchVersion;
    switchVersion(initVersion);
  </script>
